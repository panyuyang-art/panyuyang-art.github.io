<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pan Yu-Yang</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #86c166; /* 草綠色背景 */
    color: #ffffff;            
    min-height: 100vh;
    overflow-x: hidden;
}

/* ==========================================
   頂部導覽列 (位置絕對固定，不影響主內容)
   ========================================== */
.top-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 30px 40px;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
}

.menu-toggle-btn {
    font-size: 24px;
    cursor: pointer;
    transition: opacity 0.2s;
}
.menu-toggle-btn:hover { opacity: 0.7; }

.search-toggle-btn {
    font-size: 22px;
    cursor: pointer;
    transition: opacity 0.2s;
}
.search-toggle-btn:hover { opacity: 0.7; }

/* ==========================================
   📐 修正版：浮空下拉式小側欄 panel
   ========================================== */
.nav-panel {
    position: fixed;
    top: 70px;         /* 緊貼在漢堡鈕下方 */
    left: 40px;        /* 完美對齊漢堡鈕 */
    width: 150px;      /* 秀氣的窄版寬度 */
    background-color: #86c166; /* 保持跟背景同色 */
    z-index: 90;
    box-sizing: border-box;
    
    /* 透過加深微陰影與微調圓角，讓它從綠色背景中立體浮現，不再隱形 */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
    border-radius: 6px;
    
    /* 動態滑動的核心（預設隱藏） */
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    padding: 0 20px;   /* 預設上下 padding 為 0，避免沒點開時露餡 */
    transition: max-height 0.35s ease-in-out, opacity 0.25s ease-in-out, padding 0.35s ease-in-out;
}

/* 當側欄加上 .open 樣式時優雅滑下 */
.nav-panel.open {
    max-height: 400px; /* 給予足夠容納所有展開項目的最大高度 */
    opacity: 1;
    padding: 15px 20px; /* 展開時才流暢加入內襯間距 */
}

.menu-item {
    display: block;
    text-decoration: none;
    color: #ffffff;
    font-size: 15px;       /* 縮小字體，更精緻 */
    padding: 10px 0;
    cursor: pointer;
    letter-spacing: 3px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* 隱約的水平分界線 */
}
.menu-item:last-of-type {
    border-bottom: none; /* 最後一項不需要底線 */
}
.menu-item:hover { opacity: 0.7; }

/* 畫過底下的子選單（點擊畫過後順暢向下滑出） */
.submenu {
    max-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-left: 10px;
    margin-left: 2px;
    transition: max-height 0.3s ease-in-out, margin-top 0.3s ease-in-out;
}
/* 當子選單被加上 .open 時展開 */
.submenu.open {
    max-height: 100px;
    margin-top: 8px;
    margin-bottom: 8px;
}
.submenu-item {
    text-decoration: none;
    color: rgba(255, 255, 255, 0.75);
    font-size: 13px;       
    letter-spacing: 2px;
}
.submenu-item:hover { color: #ffffff; }

/* ==========================================
   🔍 搜尋功能彈出視窗
   ========================================== */
.search-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: rgba(0, 0, 0, 0.85); 
    z-index: 300;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}
.search-overlay.open {
    opacity: 1;
    pointer-events: auto;
}
.close-search-btn {
    position: absolute;
    top: 30px;
    right: 40px;
    font-size: 26px;
    cursor: pointer;
    color: #fff;
}
.search-box {
    width: 80%;
    max-width: 500px;
    text-align: center;
}
.search-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid #ffffff;
    padding: 10px;
    color: #ffffff;
    font-size: 20px;
    outline: none;
    letter-spacing: 2px;
}

/* ==========================================
   🖼px 中央主要內容區 (完全不受側欄動態影響)
   ========================================== */
.main-content {
    padding: 120px 20px 60px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;    
    justify-content: center; 
    min-height: 100vh;
    position: relative;
    z-index: 10; 
}

.profile-name-en {
    font-size: 28px;        
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-weight: 300;
}

.profile-name-zh {
    font-size: 20px;
    letter-spacing: 6px;
    margin-bottom: 40px;    
    font-weight: 400;
}

.profile-img-wrapper {
    width: 100%;
    max-width: 200px;       /* 質感精緻小尺寸 */
    margin-bottom: 45px;
    display: flex;
    justify-content: center;
}

.profile-img-wrapper img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
}

.social-buttons {
    display: flex;
    gap: 24px;              
}

.circle-btn {
    width: 40px;            
    height: 40px;
    background-color: rgba(255, 255, 255, 0.2); 
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffffff;
    text-decoration: none;
    font-size: 18px;
    transition: background-color 0.2s ease, transform 0.2s ease;
}
.circle-btn:hover {
    background-color: rgba(255, 255, 255, 0.4); 
    transform: scale(1.05);     
}

/* 手機版適應調整 */
@media (max-width: 768px) {
    .top-navbar { padding: 25px 25px; }
    .nav-panel { left: 25px; top: 65px; } 
    .close-search-btn { right: 25px; top: 25px; }
    .profile-name-en { font-size: 24px; }
    .profile-name-zh { font-size: 18px; }
    .profile-img-wrapper { max-width: 180px; } 
}
</style>
</head>

<body>

<header class="top-navbar">
    <div class="menu-toggle-btn" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>
    <div class="search-toggle-btn" onclick="openSearch()">
        <i class="fas fa-search"></i>
    </div>
</header>

<nav class="nav-panel" id="navPanel">
    <a href="about.html" class="menu-item">走過</a>
    
    <span class="menu-item" onclick="toggleArtMenu(event)">畫過</span>
    <div class="submenu" id="art-submenu">
        <a href="genealogy.html" class="submenu-item">族譜系列</a>
        <a href="pseudo-classic.html" class="submenu-item">擬古系列</a>
    </div>
    
    <a href="writing.html" class="menu-item">寫過</a>
</nav>

<div class="search-overlay" id="searchOverlay">
    <div class="close-search-btn" onclick="closeSearch()">
        <i class="fas fa-times"></i>
    </div>
    <div class="search-box">
        <input type="text" class="search-input" placeholder="輸入關鍵字搜尋作品資訊..." onkeypress="handleSearch(event)">
    </div>
</div>

<main class="main-content">
    <div class="profile-name-en">Pan Yu Yang</div>
    <div class="profile-name-zh">潘羽鍚</div>

    <div class="profile-img-wrapper">
        <img src="個人照_彩色.jpg" alt="潘羽鍚 Pan Yu Yang">
    </div>

    <div class="social-buttons">
        <a href="https://www.instagram.com/bennypan920717/" target="_blank" class="circle-btn" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="mailto:benny920717@gmail.com" class="circle-btn" title="Email">
            <i class="far fa-envelope"></i>
        </a>
    </div>
</main>

<script>
// 控制大選單的開關（再次點擊漢堡選單可以收回）
function toggleMenu() {
    var panel = document.getElementById('navPanel');
    panel.classList.toggle('open');
}

// 控制「畫過」子選單的展開與收合
function toggleArtMenu(event) {
    event.stopPropagation(); // 防止點擊事件干擾到外層
    var submenu = document.getElementById('art-submenu');
    submenu.classList.toggle('open');
}

// 控制搜尋視窗開關
function openSearch() {
    document.getElementById('searchOverlay').classList.add('open');
    setTimeout(() => {
        document.querySelector('.search-input').focus();
    }, 100);
}
function closeSearch() {
    document.getElementById('searchOverlay').classList.remove('open');
}

function handleSearch(event) {
    if (event.key === 'Enter') {
        alert('正在搜尋：' + event.target.value + ' ...');
    }
}
</script>

</body>
</html>
