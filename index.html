<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pan Yu-Yang</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    /* 使用你指定的草綠色作為背景 */
    background-color: #86c166; 
    color: #ffffff;            
    min-height: 100vh;
    overflow-x: hidden;
}

/* ==========================================
   頂部導覽列 (左上角漢堡、右上角搜尋)
   ========================================== */
.top-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 30px 40px;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
}

/* 左上角三條橫杠（漢堡選單鈕） */
.menu-toggle-btn {
    font-size: 24px;
    cursor: pointer;
    transition: opacity 0.2s;
}
.menu-toggle-btn:hover { opacity: 0.7; }

/* 右上角搜尋符號 */
.search-toggle-btn {
    font-size: 22px;
    cursor: pointer;
    transition: opacity 0.2s;
}
.search-toggle-btn:hover { opacity: 0.7; }

/* ==========================================
   📐 浮空下拉式小側欄 (Dropdown Menu Panel)
   ========================================== */
.nav-panel {
    position: fixed;
    top: 75px;        /* 剛好在漢堡按鈕的下方 */
    left: 40px;       /* 與漢堡按鈕對齊 */
    width: 160px;     /* 給予精巧的固定寬度 */
    background-color: rgba(134, 193, 102, 0.95); /* 帶有微透明度的同款草綠色 */
    z-index: 90;
    box-sizing: border-box;
    
    /* 核心：從左上方滑動與隱藏的動態設定 */
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.35s ease-in-out, opacity 0.25s ease-in-out;
}

/* 當小側欄被加上 .open 時往下滑出 */
.nav-panel.open {
    max-height: 300px; /* 給予足夠容納所有選單的高度 */
    opacity: 1;
}

/* 選單項目排版與秀氣字體調校 */
.panel-menu {
    padding: 10px 0;
}

.menu-item {
    display: block;
    text-decoration: none;
    color: #ffffff;
    font-size: 16px;       /* ✨ 字體縮小，顯得更精緻優雅 */
    margin: 15px 0;
    cursor: pointer;
    letter-spacing: 2px;
}
.menu-item:hover { opacity: 0.7; }

/* 畫過底下的子選單 */
.submenu {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-out;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-left: 12px;    /* 子選單稍微往右內縮，呈現層次感 */
    border-left: 1px solid rgba(255, 255, 255, 0.3); /* 秀氣的左邊提示線 */
    margin-left: 2px;
}
.submenu.open {
    max-height: 80px;
    margin-top: -5px;
    margin-bottom: 10px;
}
.submenu-item {
    text-decoration: none;
    color: rgba(255, 255, 255, 0.75);
    font-size: 14px;       /* 子選單字體再小一點點 */
    letter-spacing: 1px;
}
.submenu-item:hover { color: #ffffff; }

/* ==========================================
   🔍 搜尋功能彈出視窗 (Modal)
   ========================================== */
.search-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: rgba(0, 0, 0, 0.85); 
    z-index: 300;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}
.search-overlay.open {
    opacity: 1;
    pointer-events: auto;
}
.close-search-btn {
    position: absolute;
    top: 30px;
    right: 40px;
    font-size: 26px;
    cursor: pointer;
    color: #fff;
}
.search-box {
    width: 80%;
    max-width: 500px;
    text-align: center;
}
.search-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid #ffffff;
    padding: 10px;
    color: #ffffff;
    font-size: 20px;
    outline: none;
    letter-spacing: 2px;
}
.search-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

/* ==========================================
   🖼️ 中央主要內容區 (完全不受側欄影響)
   ========================================== */
.main-content {
    padding: 120px 20px 60px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;    
    justify-content: center; 
    min-height: 100vh;
    position: relative;
    z-index: 10; /* 低於選單的 z-index，保證不會互相干擾 */
}

/* 姓名樣式 */
.profile-name-en {
    font-size: 28px;        
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-weight: 300;
}

.profile-name-zh {
    font-size: 20px;
    letter-spacing: 6px;
    margin-bottom: 40px;    
    font-weight: 400;
}

/* 個人照顯示容器 */
.profile-img-wrapper {
    width: 100%;
    max-width: 200px;       /* 電腦版精緻縮小尺寸 */
    margin-bottom: 45px;
    display: flex;
    justify-content: center;
}

.profile-img-wrapper img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
}

/* 社群按鈕容器 */
.social-buttons {
    display: flex;
    gap: 24px;              
}

/* 雙圓形按鈕樣式 */
.circle-btn {
    width: 40px;            
    height: 40px;
    background-color: rgba(255, 255, 255, 0.2); 
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffffff;
    text-decoration: none;
    font-size: 18px;
    transition: background-color 0.2s ease, transform 0.2s ease;
}

.circle-btn:hover {
    background-color: rgba(255, 255, 255, 0.4); 
    transform: scale(1.05);     
}

/* 手機版適應調整 */
@media (max-width: 768px) {
    .top-navbar { padding: 25px 25px; }
    .nav-panel { left: 25px; top: 65px; } /* 手機版同步對齊左上角漢堡 */
    .close-search-btn { right: 25px; top: 25px; }
    .profile-name-en { font-size: 24px; }
    .profile-name-zh { font-size: 18px; }
    .profile-img-wrapper { max-width: 180px; } /* 手機版照片尺寸 */
}
</style>
</head>

<body>

<header class="top-navbar">
    <div class="menu-toggle-btn" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>
    <div class="search-toggle-btn" onclick="openSearch()">
        <i class="fas fa-search"></i>
    </div>
</header>

<nav class="nav-panel" id="navPanel">
    <div class="panel-menu">
        <a href="about.html" class="menu-item">走過</a>
        
        <span class="menu-item" onclick="toggleArtMenu(event)">畫過</span>
        <div class="submenu" id="art-submenu">
            <a href="genealogy.html" class="submenu-item">族譜系列</a>
            <a href="pseudo-classic.html" class="submenu-item">擬古系列</a>
        </div>
        
        <a href="writing.html" class="menu-item">寫過</a>
    </div>
</nav>

<div class="search-overlay" id="searchOverlay">
    <div class="close-search-btn" onclick="closeSearch()">
        <i class="fas fa-times"></i>
    </div>
    <div class="search-box">
        <input type="text" class="search-input" placeholder="輸入關鍵字搜尋作品資訊..." onkeypress="handleSearch(event)">
    </div>
</div>

<main class="main-content">

    <div class="profile-name-en">Pan Yu Yang</div>
    <div class="profile-name-zh">潘羽鍚</div>

    <div class="profile-img-wrapper">
        <img src="個人照_彩色.jpg" alt="潘羽鍚 Pan Yu Yang">
    </div>

    <div class="social-buttons">
        <a href="https://www.instagram.com/bennypan920717/" target="_blank" class="circle-btn" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="mailto:benny920717@gmail.com" class="circle-btn" title="Email">
            <i class="far fa-envelope"></i>
        </a>
    </div>

</main>

<script>
// ✨ 切換下拉小側欄的開與關（再次點擊同一個漢堡鈕即可縮回）
function toggleMenu() {
    var panel = document.getElementById('navPanel');
    panel.classList.toggle('open');
}

// 控制「畫過」子選單的滑出與縮回
function toggleArtMenu(event) {
    event.stopPropagation();
    var submenu = document.getElementById('art-submenu');
    submenu.classList.toggle('open');
}

// 控制搜尋視窗的開關
function openSearch() {
    document.getElementById('searchOverlay').classList.add('open');
    setTimeout(() => {
        document.querySelector('.search-input').focus();
    }, 100);
}
function closeSearch() {
    document.getElementById('searchOverlay').classList.remove('open');
}

// 模擬搜尋邏輯
function handleSearch(event) {
    if (event.key === 'Enter') {
        alert('正在搜尋：' + event.target.value + ' ...');
    }
}
</script>

</body>
</html>
