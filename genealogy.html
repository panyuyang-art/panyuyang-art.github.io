<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>族譜系列 - Pan Yu-Yang</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #268785; color: #ffffff; min-height: 100vh; overflow-x: hidden;
}

/* 頂部導覽列 */
.top-navbar { 
    position: fixed; top: 0; left: 0; width: 100%; padding: 30px 40px; box-sizing: border-box; 
    display: flex; justify-content: space-between; align-items: center; z-index: 100; 
}
.menu-toggle-btn { font-size: 24px; cursor: pointer; transition: opacity 0.2s; color: #ffffff; }
.search-toggle-btn { font-size: 22px; cursor: pointer; transition: opacity 0.2s; color: #ffffff; }
.menu-toggle-btn:hover, .search-toggle-btn:hover { opacity: 0.7; }

/* 側欄 */
.nav-panel { 
    position: fixed; top: 70px; left: 40px; width: 150px; background-color: #ffffff; 
    z-index: 90; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); border-radius: 6px; 
    max-height: 0; overflow: hidden; opacity: 0; padding: 0 20px; 
    transition: all 0.35s ease-in-out; 
}
.nav-panel.open { max-height: 470px; opacity: 1; padding: 15px 20px; }

/* 房子符號 */
.home-icon-btn {
    display: flex; justify-content: flex-start; align-items: center;
    color: #268785; font-size: 18px; padding: 12px 0 12px 0; text-decoration: none;
    width: 100%; margin-bottom: 5px; transition: opacity 0.2s;
}

.menu-item { display: block; text-decoration: none; color: #268785; font-size: 15px; padding: 10px 0; cursor: pointer; letter-spacing: 3px; }
.submenu { max-height: 0; overflow: hidden; display: flex; flex-direction: column; gap: 12px; padding-left: 10px; margin-left: 2px; border-left: 1px solid rgba(38, 135, 133, 0.3); transition: max-height 0.3s ease-in-out; }
.submenu.open { max-height: 100px; margin-top: 8px; margin-bottom: 8px; }
.submenu-item { display: block; text-decoration: none; color: rgba(38, 135, 133, 0.7); font-size: 13px; letter-spacing: 2px; }
.submenu-item.active { color: #268785; font-weight: bold; pointer-events: none; }

/* 內容區 */
.main-content { margin: 0 auto; padding: 120px 40px 60px 40px; max-width: 900px; }
h1 { font-size: 24px; text-align: center; margin-bottom: 60px; letter-spacing: 2px; color: #ffffff; font-weight: normal; }

.work-card { margin-bottom: 140px; }
/* 固定高度確保切換圖片不跳動 */
.work-img-wrapper { height: 650px; display: flex; justify-content: center; align-items: center; background-color: #268785; }
.work-img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }

/* 圓形按鈕：維持與圖片 10px 的固定間距 */
.circle-toggle-trigger { 
    width: 44px; height: 44px; background-color: rgba(0,0,0,0.25); border-radius: 50%; 
    display: flex; justify-content: center; align-items: center; cursor: pointer; 
    margin: 10px auto 0 auto;
}

.toggle-content { max-height: 0; overflow: hidden; transition: all 0.45s ease-in-out; opacity: 0; }
.toggle-content.open { max-height: 900px; opacity: 1; padding-top: 25px; }
.work-meta { font-size: 15px; font-weight: bold; margin-bottom: 14px; }
.work-seal { font-size: 14px; line-height: 1.8; color: #e0f2f1; white-space: pre-line; margin-bottom: 25px; }
.thumb-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; }
.thumb-img { width: 80px; height: 80px; object-fit: cover; cursor: pointer; border: 1px solid #1d6664; opacity: 0.5; margin: 5px; transition: all 0.2s; }
.thumb-img:hover, .thumb-img.active { opacity: 1; border-color: #ffffff; }

/* 📱 手機版調整 */
@media (max-width: 768px) {
    .top-navbar { padding: 25px 25px; }
    .nav-panel { left: 25px; top: 65px; }
    .main-content { padding: 100px 25px 40px 25px; }
    .work-img-wrapper { height: 320px; }
    .thumb-img { width: 60px; height: 60px; }
}
</style>
</head>

<body>

<header class="top-navbar">
    <div class="menu-toggle-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="search-toggle-btn" onclick="openSearch()"><i class="fas fa-search"></i></div>
</header>

<nav class="nav-panel" id="navPanel">
    <a href="index.html" class="home-icon-btn"><i class="fas fa-home"></i></a>
    <a href="about.html" class="menu-item">走過</a>
    <span class="menu-item" onclick="toggleArtMenu(event)">畫過</span>
    <div class="submenu open" id="art-submenu">
        <a href="printmaking.html" class="submenu-item active">族譜系列</a>
        <a href="pseudo-classic.html" class="submenu-item">擬古系列</a>
    </div>
    <a href="writing.html" class="menu-item">寫過</a>
</nav>

<main class="main-content">
    <h1>族譜系列</h1>
    
    <script>
        const works = [
            { id: 1, name: "阿公的發財車", info: "2019｜原子筆、黃素描紙｜39.4 × 54.6 cm", seal: "我的阿公是個農夫，他有一台發財車，載著他種的水果、蔬菜、米糧來來往往。我為這台車加上許多新功能，像是做爆米香、釀小米酒、製作米粉等等，這樣阿公就不用那麼辛苦下田了。" },
            { id: 2, name: "阿嬤是偉大的田莊人", info: "2020｜原子筆、黃素描紙｜39.4 × 54.6 cm", seal: "我的阿嬤是個農婦，這幅畫描繪她的日常起居，比方做龍眼乾、曬米、網土芒果。多年前創作時，對鄉村十分嚮往，時常有意將其浪漫化、美化，想像阿嬤的生活是多麼幸福靜好。" },
            { id: 3, name: "姐妹花", info: "2021｜原子筆、黃素描紙｜39.4 × 54.6 cm", seal: "我的姐姐與兩個堂姐是好麻吉，她們仨小時候曾經夢想建造一個樹屋，可以久久住在一起，快樂地過日子。" },
            { id: 4, name: "阿祖冰菓室", info: "2024｜原子筆、黃素描紙｜39.4 × 54.6 cm", seal: "阿祖年輕時曾推著車子賣剉冰，老年失智後，依然記得如何手製粉圓、粉粿等配料。原本想要像《阿公的發財車》那樣、將賣冰的推車加上許多奇特功能的機器；但在進行到20%時，阿祖便過世了，於意我改變原本的構想，換成一幢冰菓室紙紮屋。" }
        ];

        works.forEach(work => {
            document.write(`
                <div class="work-card">
                    <div class="work-img-wrapper"><img id="main-img-${work.id}" src="${work.name}_全貌.jpg"></div>
                    <div class="circle-toggle-trigger" onclick="toggleWorkContent(this)"><i class="fas fa-chevron-down"></i></div>
                    <div class="toggle-content">
                        <div class="work-meta">${work.name}｜${work.info}</div>
                        <div class="work-seal">${work.seal}</div>
                        <div class="thumb-container">
                            <img class="thumb-img active" src="${work.name}_全貌.jpg" onclick="switchImage('main-img-${work.id}', this)">
                            <img class="thumb-img" src="${work.name}_局部1.jpg" onclick="switchImage('main-img-${work.id}', this)">
                            <img class="thumb-img" src="${work.name}_局部2.jpg" onclick="switchImage('main-img-${work.id}', this)">
                            <img class="thumb-img" src="${work.name}_局部3.jpg" onclick="switchImage('main-img-${work.id}', this)">
                            <img class="thumb-img" src="${work.name}_局部4.jpg" onclick="switchImage('main-img-${work.id}', this)">
                        </div>
                    </div>
                </div>
            `);
        });
    </script>
</main>

<script>
    function toggleMenu() { document.getElementById('navPanel').classList.toggle('open'); }
    function toggleArtMenu(e) { e.stopPropagation(); document.getElementById('art-submenu').classList.toggle('open'); }
    function toggleWorkContent(t) { t.classList.toggle('open'); t.nextElementSibling.classList.toggle('open'); }
    function switchImage(id, t) { document.getElementById(id).src = t.src; Array.from(t.parentNode.children).forEach(img => img.classList.remove('active')); t.classList.add('active'); }
    function openSearch() { /* 搜尋功能 */ }
</script>
</body>
</html>
