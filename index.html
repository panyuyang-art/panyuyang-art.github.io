<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Pan Yu-Yang</title>

<style>
/* 基礎設定：底色改為深灰色 */
body {
    font-family: Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #121212; 
    color: #ffffff;            
    display: flex; 
    min-height: 100vh;
}

/* 左側固定側邊欄選單 */
.sidebar {
    width: 260px;
    padding: 60px 40px;
    border-right: 1px solid #252525; /* 配合深灰底色稍微調亮邊框線 */
    position: fixed; 
    height: 100vh;
    box-sizing: border-box;
}

.sidebar h2 {
    font-size: 22px;
    font-weight: normal;
    margin-bottom: 40px;
    letter-spacing: 2px;
}

.menu-item {
    display: block;
    text-decoration: none;
    color: #ffffff;
    font-size: 16px;
    margin-bottom: 24px;
}

.menu-item:hover, .submenu-item:hover {
    color: #aaaaaa;
}

.submenu {
    margin-left: 15px;
    margin-bottom: 24px;
    border-left: 1px solid #333; 
    padding-left: 15px;
}

.submenu-item {
    display: block;
    text-decoration: none;
    color: #888888; 
    font-size: 14px;
    margin-bottom: 12px;
}

.submenu-item.active {
    color: #ffffff;
    font-weight: bold;
    pointer-events: none;
}

/* 右側主要內容區區塊 */
.main-content {
    margin-left: 260px; 
    padding: 100px 80px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
}

.welcome-text {
    font-size: 14px;
    color: #555555;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<!-- 左側側邊欄導覽列 -->
<nav class="sidebar">
    <h2>Pan Yu-Yang</h2>
    <a href="about.html" class="menu-item">藝術家介紹</a>
    <span class="menu-item" style="font-weight: bold;">作品</span>
    <div class="submenu">
        <a href="printmaking.html" class="submenu-item">版畫系列</a>
        <a href="pseudo-classic.html" class="submenu-item">擬古系列</a>
    </div>
    <a href="writing.html" class="menu-item">書寫</a>
</nav>

<!-- 右側首頁留白區 -->
<main class="main-content">
    <div class="welcome-text">請由左側選單瀏覽作品系列。</div>
</main>

</body>
</html>
