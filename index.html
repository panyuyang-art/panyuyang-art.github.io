<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pan Yu-Yang</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #86c166; /* 草綠色背景 */
    color: #ffffff;            
    min-height: 100vh;
    overflow-x: hidden;
}

/* ==========================================
   頂部導覽列 (位置絕對固定，不影響主內容)
   ========================================== */
.top-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 30px 40px;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
}

.menu-toggle-btn {
    font-size: 24px;
    cursor: pointer;
    transition: opacity 0.2s;
}
.menu-toggle-btn:hover { opacity: 0.7; }

.search-toggle-btn {
    font-size: 22px;
    cursor: pointer;
    transition: opacity 0.2s;
}
.search-toggle-btn:hover { opacity: 0.7; }

/* ==========================================
   📐 浮空下拉式小側欄 panel（白底綠字）
   ========================================== */
.nav-panel {
    position: fixed;
    top: 70px;         
    left: 40px;        
    width: 150px;      
    background-color: #ffffff; 
    z-index: 90;
    box-sizing: border-box;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
    border-radius: 6px;
    
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    padding: 0 20px;   
    transition: max-height 0.35s ease-in-out, opacity 0.25s ease-in-out, padding 0.35s ease-in-out;
}

.nav-panel.open {
    max-height: 400px; 
    opacity: 1;
    padding: 15px 20px; 
}

.menu-item {
    display: block;
    text-decoration: none;
    color: #86c166;        
    font-size: 15px;       
    padding: 10px 0;
    cursor: pointer;
    letter-spacing: 3px;
    border-bottom: none;   
}
.menu-item:hover { opacity: 0.7; }

.submenu {
    max-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-left: 10px;
    margin-left: 2px;
    border-left: 1px solid rgba(134, 193, 102, 0.3); 
    transition: max-height 0.3s ease-in-out, margin-top 0.3s ease-in-out;
}
.submenu.open {
    max-height: 100px;
    margin-top: 8px;
    margin-bottom: 8px;
}
.submenu-item {
    text-decoration: none;
    color: rgba(134, 193, 102, 0.7); 
    font-size: 13px;       
    letter-spacing: 2px;
}
.submenu-item:hover { color: #86c166; } 

/* ==========================================
   🔍 搜尋功能彈出視窗與結果顯示
   ========================================== */
.search-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: rgba(0, 0, 0, 0.9); 
    z-index: 300;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* 改為從頂部排列，方便留空間給結果 */
    align-items: center;
    padding-top: 15vh;
    box-sizing: border-box;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}
.search-overlay.open {
    opacity: 1;
    pointer-events: auto;
}
.close-search-btn {
    position: absolute;
    top: 30px;
    right: 40px;
    font-size: 26px;
    cursor: pointer;
    color: #fff;
}
.search-box {
    width: 80%;
    max-width: 500px;
    text-align: center;
}
.search-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid #ffffff;
    padding: 10px;
    color: #ffffff;
    font-size: 20px;
    outline: none;
    letter-spacing: 2px;
    text-align: center;
}

/* 🎨 搜尋結果列表樣式 */
.search-results {
    width: 80%;
    max-width: 500px;
    margin-top: 30px;
    max-height: 50vh;
    overflow-y: auto;
    text-align: left;
}
.result-item {
    display: block;
    background-color: rgba(255, 255, 255, 0.1);
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 4px;
    text-decoration: none;
    color: #ffffff;
    transition: background-color 0.2s;
}
.result-item:hover {
    background-color: rgba(255, 255, 255, 0.2);
}
.result-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 5px;
    color: #86c166; /* 讓結果標題帶有你的招牌綠色 */
}
.result-desc {
    font-size: 13px;
    color: #cccccc;
}
.no-result {
    text-align: center;
    color: #aaaaaa;
    font-size: 14px;
    margin-top: 20px;
}

/* ==========================================
   🖼️ 中央主要內容區
   ========================================== */
.main-content {
    padding: 120px 20px 60px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;    
    justify-content: center; 
    min-height: 100vh;
    position: relative;
    z-index: 10; 
}

.profile-name-en {
    font-size: 28px;        
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-weight: 300;
}

.profile-name-zh {
    font-size: 20px;
    letter-spacing: 6px;
    margin-bottom: 40px;    
    font-weight: 400;
}

.profile-img-wrapper {
    width: 100%;
    max-width: 200px;       
    margin-bottom: 45px;
    display: flex;
    justify-content: center;
}

.profile-img-wrapper img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
}

.social-buttons {
    display: flex;
    gap: 24px;              
}

.circle-btn {
    width: 40px;            
    height: 40px;
    background-color: rgba(255, 255, 255, 0.2); 
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffffff;
    text-decoration: none;
    font-size: 18px;
    transition: background-color 0.2s ease, transform 0.2s ease;
}
.circle-btn:hover {
    background-color: rgba(255, 255, 255, 0.4); 
    transform: scale(1.05);     
}

/* 手機版適應調整 */
@media (max-width: 768px) {
    .top-navbar { padding: 25px 25px; }
    .nav-panel { left: 25px; top: 65px; } 
    .close-search-btn { right: 25px; top: 25px; }
    .profile-name-en { font-size: 24px; }
    .profile-name-zh { font-size: 18px; }
    .profile-img-wrapper { max-width: 180px; } 
}
</style>
</head>

<body>

<header class="top-navbar">
    <div class="menu-toggle-btn" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>
    <div class="search-toggle-btn" onclick="openSearch()">
        <i class="fas fa-search"></i>
    </div>
</header>

<nav class="nav-panel" id="navPanel">
    <a href="about.html" class="menu-item">走過</a>
    
    <span class="menu-item" onclick="toggleArtMenu(event)">畫過</span>
    <div class="submenu" id="art-submenu">
        <a href="genealogy.html" class="submenu-item">族譜系列</a>
        <a href="pseudo-classic.html" class="submenu-item">擬古系列</a>
    </div>
    
    <a href="writing.html" class="menu-item">寫過</a>
</nav>

<div class="search-overlay" id="searchOverlay">
    <div class="close-search-btn" onclick="closeSearch()">
        <i class="fas fa-times"></i>
    </div>
    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="輸入關鍵字搜尋作品資訊..." oninput="performSearch()">
    </div>
    <div class="search-results" id="searchResults"></div>
</div>

<main class="main-content">
    <div class="profile-name-en">Pan Yu Yang</div>
    <div class="profile-name-zh">潘羽鍚</div>

    <div class="profile-img-wrapper">
        <img src="個人照_彩色.jpg" alt="潘羽鍚 Pan Yu Yang">
    </div>

    <div class="social-buttons">
        <a href="https://www.instagram.com/bennypan920717/" target="_blank" class="circle-btn" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="mailto:benny920717@gmail.com" class="circle-btn" title="Email">
            <i class="far fa-envelope"></i>
        </a>
    </div>
</main>

<script>
// ==========================================
// 📦 網站作品與頁面的「靜態資料庫」
// 未来如果你增加了新作品或新網頁，可以在此處依照格式自行增減！
// ==========================================
const websiteData = [
    { title: "關於我 (走過)", desc: "潘羽鍚的個人簡介與生命經歷。", url: "about.html" },
    { title: "族譜系列", desc: "「畫過」單元中的當代藝術創作——族譜系列作品。", url: "genealogy.html" },
    { title: "擬古系列", desc: "「畫過」單元中嘗試傳統美學轉譯的擬古系列創作。", url: "pseudo-classic.html" },
    { title: "文字創作 (寫過)", desc: "收錄潘羽鍚撰寫過的文章、評論與文學隨筆。", url: "writing.html" },
    // 💡 你可以在下方繼續擴充真實的作品，例如：
    // { title: "族譜系列一號作品", desc: "探討血緣與符號重組的水墨設色原作。", url: "genealogy.html#work1" }
];

function toggleMenu() {
    var panel = document.getElementById('navPanel');
    panel.classList.toggle('open');
}

function toggleArtMenu(event) {
    event.stopPropagation(); 
    var submenu = document.getElementById('art-submenu');
    submenu.classList.toggle('open');
}

function openSearch() {
    document.getElementById('searchOverlay').classList.add('open');
    // 清空上一次的搜尋紀錄
    document.getElementById('searchInput').value = "";
    document.getElementById('searchResults').innerHTML = "";
    setTimeout(() => {
        document.getElementById('searchInput').focus();
    }, 100);
}

function closeSearch() {
    document.getElementById('searchOverlay').classList.remove('open');
}

// ==========================================
// 🔍 核心：搜尋比對與渲染邏輯
// ==========================================
function performSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultsContainer = document.getElementById('searchResults');
    
    // 如果輸入框是空的，不顯示任何結果
    if (query === "") {
        resultsContainer.innerHTML = "";
        return;
    }
    
    // 全文檢索比對標題 (title) 或描述 (desc)
    const filteredData = websiteData.filter(item => 
        item.title.toLowerCase().includes(query) || 
        item.desc.toLowerCase().includes(query)
    );
    
    // 渲染搜尋結果
    if (filteredData.length > 0) {
        let htmlContent = "";
        filteredData.forEach(item => {
            htmlContent += `
                <a href="${item.url}" class="result-item">
                    <div class="result-title">${item.title}</div>
                    <div class="result-desc">${item.desc}</div>
                </a>
            `;
        });
        resultsContainer.innerHTML = htmlContent;
    } else {
        resultsContainer.innerHTML = `<div class="no-result">找不到與「${query}」相符的作品或資訊</div>`;
    }
}
</script>

</body>
</html>
