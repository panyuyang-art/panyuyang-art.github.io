<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>靜物系列 - Pan Yu-Yang</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #574C57; color: #ffffff; min-height: 100vh; overflow-x: hidden; }

/* 導覽列與側欄 */
.top-navbar { position: fixed; top: 0; left: 0; width: 100%; padding: 30px 40px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.menu-toggle-btn, .search-toggle-btn { font-size: 24px; cursor: pointer; color: #ffffff; }

.nav-panel { 
    position: fixed; top: 70px; left: 40px; width: 150px; 
    background-color: #ffffff; z-index: 90; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
    border-radius: 6px; max-height: 0; overflow: hidden; opacity: 0; 
    padding: 0 20px; transition: all 0.35s ease-in-out; 
}
.nav-panel.open { max-height: 500px; opacity: 1; padding: 15px 20px; }

.home-icon-btn {
    display: flex; justify-content: flex-start; align-items: center;
    color: #574C57; font-size: 18px; padding: 12px 0 6px 0; text-decoration: none;
    width: 100%; margin-bottom: 5px; transition: opacity 0.2s;
}
.home-icon-btn:hover { opacity: 0.7; }

.menu-item { display: block; text-decoration: none; color: #574C57; font-size: 15px; padding: 10px 0; cursor: pointer; letter-spacing: 3px; }

.submenu { 
    max-height: 0; overflow: hidden; display: flex; flex-direction: column; 
    gap: 12px; padding-left: 10px; border-left: 1px solid rgba(87,76,87,0.3);
    transition: max-height 0.4s ease-out, margin 0.4s ease-out;
}
.submenu.open { max-height: 140px; margin: 8px 0; }
.submenu-item { text-decoration: none; color: rgba(87,76,87,0.7); font-size: 13px; letter-spacing: 2px; }
.submenu-item.active { color: #574C57; font-weight: bold; pointer-events: none; }

.search-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: rgba(0,0,0,0.88); z-index: 300; display: flex; flex-direction: column; align-items: center; padding-top: 15vh; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.search-overlay.open { opacity: 1; pointer-events: auto; }
.search-input { width: 80%; max-width: 500px; background: transparent; border: none; border-bottom: 2px solid #ffffff; padding: 10px; color: #ffffff; font-size: 22px; text-align: center; outline: none; }

.main-content { margin: 0 auto; padding: 120px 40px 60px 40px; max-width: 900px; width: 100%; box-sizing: border-box; }

h1 { 
    font-size: 24px; font-weight: normal; margin-bottom: 60px; 
    letter-spacing: 2px; text-align: center; 
}

.work-card { margin-top: 40px; margin-bottom: 140px; }

.work-img-wrapper { 
    width: 100%; display: flex; justify-content: center; 
    background-color: #574C57; overflow: hidden;
}
.work-img-wrapper img { 
    width: 100%; height: auto; display: block; 
}

.circle-toggle-trigger { 
    width: 44px; height: 44px; background-color: rgba(0,0,0,0.25); border-radius: 50%; 
    display: flex; justify-content: center; align-items: center; cursor: pointer; 
    transition: all 0.2s; margin: 15px auto 15px auto;
}
.circle-toggle-trigger:hover { background-color: rgba(0,0,0,0.5); }
.circle-toggle-trigger.open .arrow-icon { transform: rotate(180deg); }

.toggle-content { max-height: 0; overflow: hidden; transition: all 0.45s ease-in-out; opacity: 0; }
.toggle-content.open { max-height: 900px; opacity: 1; }
.work-meta { font-size: 15px; font-weight: bold; margin-bottom: 14px; color: #ffffff; text-align: left; }
.work-seal { font-size: 14px; line-height: 1.8; color: #e0f2f1; white-space: pre-line; margin-bottom: 25px; text-align: left; }

@media (max-width: 768px) {
    .top-navbar { padding: 25px 25px; }
    .nav-panel { left: 25px; top: 65px; }
    .main-content { padding: 100px 25px 40px 25px; }
}
</style>
</head>

<body>
<header class="top-navbar">
    <div class="menu-toggle-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="search-toggle-btn" onclick="openSearch()"><i class="fas fa-search"></i></div>
</header>

<nav class="nav-panel" id="navPanel">
    <a href="index.html" class="home-icon-btn" title="回首頁"><i class="fas fa-home"></i></a>
    <a href="about.html" class="menu-item">走過</a>
    <span class="menu-item" onclick="toggleArtMenu(event)">畫過</span>
    <div class="submenu" id="art-submenu">
        <a href="genealogy.html" class="submenu-item">族譜系列</a>
        <a href="pseudo-classic.html" class="submenu-item">擬古系列</a>
        <a href="still-life.html" class="submenu-item active">靜物系列</a>
    </div>
    <a href="writing.html" class="menu-item">寫過</a>
</nav>

<div class="search-overlay" id="searchOverlay">
    <div style="position:absolute; top:30px; right:40px; font-size:26px; cursor:pointer;" onclick="closeSearch()"><i class="fas fa-times"></i></div>
    <input type="text" class="search-input" placeholder="搜尋...">
</div>

<main class="main-content">
    <h1>靜物系列</h1>    
    <script>
        const works = [
            // 請在這裡填入您的靜物系列作品資料與圖片名稱
            { title: "範例靜物作品", info: "2026｜媒材｜尺寸", seal: "作品說明文字..." }
        ];

        works.forEach(work => {
            document.write(`
                <div class="work-card">
                    <div class="work-img-wrapper">
                        <img src="${work.title}_全貌.jpg" alt="${work.title}">
                    </div>
                    <div class="circle-toggle-trigger" onclick="toggleWorkContent(this)"><i class="fas fa-chevron-down arrow-icon"></i></div>
                    <div class="toggle-content">
                        <div class="work-meta">${work.title}｜${work.info}</div>
                        <div class="work-seal">${work.seal}</div>
                    </div>
                </div>
            `);
        });
    </script>
</main>

<script>
    let menuTimer;
    function toggleMenu() { 
        const nav = document.getElementById('navPanel');
        nav.classList.toggle('open'); 
        clearTimeout(menuTimer);
        if(nav.classList.contains('open')) {
            menuTimer = setTimeout(() => nav.classList.remove('open'), 5000);
        }
    }
    document.getElementById('navPanel').addEventListener('click', () => {
        clearTimeout(menuTimer);
        menuTimer = setTimeout(() => document.getElementById('navPanel').classList.remove('open'), 5000);
    });

    function toggleArtMenu(e) { e.stopPropagation(); document.getElementById('art-submenu').classList.toggle('open'); }
    function openSearch() { document.getElementById('searchOverlay').classList.add('open'); }
    function closeSearch() { document.getElementById('searchOverlay').classList.remove('open'); }
    function toggleWorkContent(t) { t.classList.toggle('open'); t.nextElementSibling.classList.toggle('open'); }
</script>
</body>
</html>
