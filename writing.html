<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>靜物系列 - Pan Yu-Yang</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { 
    font-family: Helvetica, Arial, sans-serif; 
    margin: 0; 
    padding: 0; 
    background-color: #574C57; 
    color: #ffffff; 
    min-height: 100vh; 
    overflow-x: hidden; 
}

/* 頂部導覽列 */
.top-navbar { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    padding: 30px 40px; 
    box-sizing: border-box; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    z-index: 100; 
}
.menu-toggle-btn, .search-toggle-btn { 
    font-size: 24px; 
    cursor: pointer; 
    color: #ffffff; 
    transition: opacity 0.2s;
}
.menu-toggle-btn:hover, .search-toggle-btn:hover { opacity: 0.7; }

/* 浮空下拉式小側欄 panel（白底紫字，對應 #574C57） */
.nav-panel { 
    position: fixed; 
    top: 70px; 
    left: 40px; 
    width: 150px; 
    background-color: #ffffff; 
    z-index: 90; 
    box-sizing: border-box;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
    border-radius: 6px; 
    max-height: 0; 
    overflow: hidden; 
    opacity: 0; 
    padding: 0 20px; 
    transition: max-height 0.35s ease-in-out, opacity 0.25s ease-in-out, padding 0.35s ease-in-out; 
}
.nav-panel.open { 
    max-height: 400px; 
    opacity: 1; 
    padding: 15px 20px; 
}

.menu-item { 
    display: block; 
    text-decoration: none; 
    color: #574C57; 
    font-size: 15px; 
    padding: 10px 0; 
    cursor: pointer; 
    letter-spacing: 3px; 
    border-bottom: none; 
}
.menu-item:hover { opacity: 0.7; }

.submenu { 
    max-height: 0; 
    overflow: hidden; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    padding-left: 10px; 
    margin-left: 2px;
    border-left: 1px solid rgba(87,76,87,0.3); 
    transition: max-height 0.3s ease-in-out, margin-top 0.3s ease-in-out;
}
.submenu.open { 
    max-height: 140px; 
    margin-top: 8px;
    margin-bottom: 8px;
}
.submenu-item { 
    text-decoration: none; 
    color: rgba(87,76,87,0.7); 
    font-size: 13px; 
    letter-spacing: 2px; 
}
.submenu-item:hover { color: #574C57; }
.submenu-item.active { color: #574C57; font-weight: bold; pointer-events: none; }

/* 搜尋功能視窗 */
.search-overlay { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100vh; 
    background-color: rgba(0,0,0,0.88); 
    z-index: 300; 
    display: flex; 
    flex-direction: column; 
    justify-content: flex-start;
    align-items: center; 
    padding-top: 15vh; 
    box-sizing: border-box;
    opacity: 0; 
    pointer-events: none; 
    transition: opacity 0.3s ease; 
}
.search-overlay.open { opacity: 1; pointer-events: auto; }
.close-search-btn {
    position: absolute;
    top: 30px;
    right: 40px;
    font-size: 26px;
    cursor: pointer;
    color: #fff;
}
.search-box {
    width: 80%;
    max-width: 500px;
    text-align: center;
}
.search-input { 
    width: 100%; 
    background: transparent; 
    border: none; 
    border-bottom: 2px solid #ffffff; 
    padding: 10px; 
    color: #ffffff; 
    font-size: 22px; 
    text-align: center; 
    outline: none; 
    letter-spacing: 2px;
}

/* 搜尋結果清單樣式 */
.search-results {
    width: 80%;
    max-width: 500px;
    margin-top: 30px;
    max-height: 50vh;
    overflow-y: auto;
    text-align: left;
}
.result-item {
    display: block;
    background-color: rgba(255, 255, 255, 0.1);
    padding: 15px 20px;
    margin-bottom: 12px;
    border-radius: 6px;
    text-decoration: none;
    color: #ffffff;
    transition: background-color 0.2s ease, transform 0.2s ease;
}
.result-item:hover {
    background-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
}
.result-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 5px;
    color: #574C57;
}
.result-desc {
    font-size: 13px;
    color: #cccccc;
    letter-spacing: 1px;
}
.no-result {
    text-align: center;
    color: #aaaaaa;
    font-size: 14px;
    margin-top: 20px;
}

/* 中央主要內容區 */
.main-content { 
    margin: 0 auto; 
    padding: 120px 40px 60px 40px; 
    max-width: 900px; 
    width: 100%; 
    box-sizing: border-box; 
    text-align: center;
}

h1 { 
    font-size: 24px; 
    font-weight: normal; 
    margin-bottom: 20px; 
    letter-spacing: 2px; 
}

/* 建立中的提示小字樣式 */
.building-notice {
    font-size: 14px;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.6);
}

@media (max-width: 768px) {
    .top-navbar { padding: 25px 25px; }
    .nav-panel { left: 25px; top: 65px; } 
    .close-search-btn { right: 25px; top: 25px; }
    .main-content { padding: 100px 25px 40px 25px; }
}
</style>
</head>

<body>
<header class="top-navbar">
    <div class="menu-toggle-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="search-toggle-btn" onclick="openSearch()"><i class="fas fa-search"></i></div>
</header>

<nav class="nav-panel" id="navPanel">
    <a href="about.html" class="menu-item">走過</a>
    
    <span class="menu-item" onclick="toggleArtMenu(event)">畫過</span>
    <div class="submenu" id="art-submenu">
        <a href="genealogy.html" class="submenu-item">族譜系列</a>
        <a href="pseudo-classic.html" class="submenu-item">擬古系列</a>
        <a href="still-life.html" class="submenu-item active">靜物系列</a>
    </div>
    
    <a href="writing.html" class="menu-item">寫過</a>
</nav>

<div class="search-overlay" id="searchOverlay">
    <div class="close-search-btn" onclick="closeSearch()"><i class="fas fa-times"></i></div>
    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="輸入關鍵字搜尋作品資訊..." oninput="performSearch()">
    </div>
    <div class="search-results" id="searchResults"></div>
</div>

<main class="main-content">
    <h1>靜物系列</h1> 
    <div class="building-notice">網頁尚在建立中，所以還看不到</div>
</main>

<script>
const websiteData = [
    { title: "簡介CV", desc: "學歷, 出版, 得獎, 展覽紀錄", url: "about.html" },
    { title: "族譜系列", desc: "環繞家人的生活故事的系列創作", url: "genealogy.html" },
    { title: "擬古系列", desc: "以印章作為敘事載體的系列創作", url: "pseudo-classic.html" },
    { title: "靜物系列", desc: "靜物系列創作", url: "still-life.html" },
    { title: "文字創作", desc: "專欄隨筆與藝術書寫", url: "writing.html" }
];

let autoCloseTimer = null;

function resetAutoCloseTimer() {
    clearAutoCloseTimer(); 
    autoCloseTimer = setTimeout(function() {
        var panel = document.getElementById('navPanel');
        if (panel.classList.contains('open')) {
            panel.classList.remove('open');
        }
    }, 5000); 
}

function clearAutoCloseTimer() {
    if (autoCloseTimer) {
        clearTimeout(autoCloseTimer);
        autoCloseTimer = null;
    }
}

function toggleMenu() { 
    var panel = document.getElementById('navPanel');
    panel.classList.toggle('open'); 
    
    if (panel.classList.contains('open')) {
        resetAutoCloseTimer();
    } else {
        clearAutoCloseTimer();
    }
}

function toggleArtMenu(e) { 
    e.stopPropagation(); 
    var submenu = document.getElementById('art-submenu');
    submenu.classList.toggle('open'); 
    resetAutoCloseTimer();
}

function openSearch() { 
    document.getElementById('searchOverlay').classList.add('open');
    document.getElementById('searchInput').value = ""; 
    document.getElementById('searchResults').innerHTML = ""; 
    setTimeout(() => {
        document.getElementById('searchInput').focus();
    }, 100);
}

function closeSearch() { 
    document.getElementById('searchOverlay').classList.remove('open'); 
}

function performSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const resultsContainer = document.getElementById('searchResults');
    
    if (query === "") {
        resultsContainer.innerHTML = "";
        return;
    }
    
    const filteredData = websiteData.filter(item => 
        item.title.toLowerCase().includes(query) || 
        item.desc.toLowerCase().includes(query)
    );
    
    if (filteredData.length > 0) {
        let htmlContent = "";
        filteredData.forEach(item => {
            htmlContent += `
                <a href="${item.url}" class="result-item">
                    <div class="result-title">${item.title}</div>
                    <div class="result-desc">${item.desc}</div>
                </a>
            `;
        });
        resultsContainer.innerHTML = htmlContent;
    } else {
        resultsContainer.innerHTML = `<div class="no-result">找不到與「${query}」相符的作品或資訊</div>`;
    }
}

document.addEventListener('click', function(event) {
    var panel = document.getElementById('navPanel');
    var toggleBtn = document.querySelector('.menu-toggle-btn');
    if (panel.classList.contains('open') && !panel.contains(event.target) && !toggleBtn.contains(event.target)) {
        panel.classList.remove('open');
        clearAutoCloseTimer();
    }
});

document.getElementById('navPanel').addEventListener('click', function() {
    if (this.classList.contains('open')) {
        resetAutoCloseTimer();
    }
});
</script>
</body>
</html>
